<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veritas Protocol</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* 기존 CSS 내용 유지 */
    :root { --bg: #07080a; --surface: #0e1014; --surface2: #151820; --border: #1e2330; --accent: #4fffb0; --accent2: #00bfff; --danger: #ff4d6d; --warn: #ffb347; --text: #e8eaf0; --muted: #5a6070; --font-display: 'Syne', sans-serif; --font-body: 'Noto Sans KR', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
    /* ... (기존 스타일 코드와 동일합니다) ... */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: rgba(7,8,10,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; color: var(--accent); }
    .nav-btn { background: none; border: none; color: var(--muted); padding: 0.5rem 1rem; cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { color: var(--accent); background: rgba(79,255,176,0.08); border-radius: 6px; }
    .page { display: none; padding-top: 5rem; min-height: 100vh; }
    .page.active { display: block; }
    .hero { position: relative; padding: 5rem 2rem; max-width: 900px; margin: 0 auto; text-align: center; }
    .btn-primary { background: var(--accent); color: #07080a; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; }
    .section { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }
    .form-wrap { max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }
    input, textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; color: var(--text); margin-bottom: 1rem; }
    .hash-display { background: var(--surface2); padding: 0.75rem 1rem; font-family: monospace; font-size: 0.8rem; color: var(--accent); margin-bottom: 1rem; }
    .toast { display: none; padding: 1rem; margin-top: 1rem; border-radius: 8px; font-size: 0.9rem; background: rgba(79,255,176,0.1); color: var(--accent); }
  </style>
</head>
<body>
<nav>...</nav>
<div class="page active" id="page-home">...</div>
<div class="page" id="page-register">...</div>
<script>
  // Firebase 초기화
  const firebaseConfig = {
    apiKey: "AIzaSy...", 
    projectId: "veritas-protocol",
    // ... 나머지 설정값 ...
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 데이터를 담을 전역 배열
  let contents = [];

  // 페이지 로드 시 Firebase에서 데이터 가져오기
  async function initApp() {
    const snapshot = await db.collection("Veritas-protocol").get();
    contents = snapshot.docs.map(doc => doc.data());
    console.log("데이터 불러오기 완료:", contents);
  }
  initApp();

  // 기존 등록 함수 수정
  async function registerContent() {
    // ... 입력값 가져오기 ...
    const entry = { /* ... 데이터 객체 ... */ };
    
    // Firebase에 추가
    await db.collection("Veritas-protocol").add(entry);
    
    contents.push(entry); // 로컬 배열에도 추가해서 바로 반영
    renderDashboard(); // 화면 갱신
    alert("등록 완료!");
  }

  // ... 나머지 함수들 ...
</script>
</body>
</html>
