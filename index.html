<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veritas Protocol</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07080a; --surface: #0e1014; --surface2: #151820; --border: #1e2330;
      --accent: #4fffb0; --accent2: #00bfff; --danger: #ff4d6d; --warn: #ffb347;
      --text: #e8eaf0; --muted: #5a6070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: rgba(7,8,10,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--accent); }
    .nav-btn { background: none; border: none; color: var(--muted); padding: 0.5rem 1rem; cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { color: var(--accent); background: rgba(79,255,176,0.08); border-radius: 6px; }
    .page { display: none; padding-top: 5rem; min-height: 100vh; }
    .page.active { display: block; }
    .hero { position: relative; padding: 5rem 2rem; max-width: 900px; margin: 0 auto; text-align: center; }
    .btn-primary { background: var(--accent); color: #07080a; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; }
    .section { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }
    .form-wrap { max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }
    input, textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; color: var(--text); margin-bottom: 1rem; }
    .hash-display { background: var(--surface2); padding: 0.75rem 1rem; font-family: monospace; font-size: 0.8rem; color: var(--accent); margin-bottom: 1rem; }
    .toast { display: none; padding: 1rem; margin-top: 1rem; border-radius: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Veritas<span>Protocol</span></div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showPage('home')">개요</button>
    <button class="nav-btn" onclick="showPage('register')">콘텐츠 등록</button>
    <button class="nav-btn" onclick="showPage('repudiate')">부인 제기</button>
    <button class="nav-btn" onclick="showPage('dashboard')">대시보드</button>
  </div>
</nav>

<div class="page active" id="page-home"><div class="hero"><h1>거짓말쟁이의 배당을<br>구조적으로 차단합니다</h1></div></div>
<div class="page" id="page-register">
    <div class="form-wrap">
        <input type="text" id="reg-title" placeholder="콘텐츠 제목">
        <input type="text" id="reg-publisher" placeholder="발행자">
        <textarea id="reg-content" placeholder="원문"></textarea>
        <div id="hash-display" class="hash-display">해시 생성 대기중...</div>
        <button class="btn-primary" onclick="registerContent()">등록하기</button>
        <div id="reg-toast" class="toast"></div>
    </div>
</div>
<div class="page" id="page-repudiate"><div class="form-wrap"><h2>부인 제기</h2><div id="rep-list"></div></div></div>
<div class="page" id="page-dashboard"><div class="form-wrap"><h2>등록된 콘텐츠</h2><div id="content-list"></div></div></div>

<script>
  // 1. Firebase 초기화
  const firebaseConfig = {
    apiKey: "AIzaSyCdbtT_YPywQyzN3EOGHXewIkA_6-FbjOA",
    authDomain: "veritas-protocol.firebaseapp.com",
    projectId: "veritas-protocol",
    storageBucket: "veritas-protocol.firebasestorage.app",
    messagingSenderId: "258366044798",
    appId: "1:258366044798:web:9f3315d86db114a9ddf62f"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 2. 페이지 전환 로직
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    event.target.classList.add('active');
    if(id === 'dashboard') loadData();
  }

  // 3. 데이터 로드 및 저장 함수
  async function registerContent() {
    const title = document.getElementById('reg-title').value;
    const content = document.getElementById('reg-content').value;
    
    // Firestore 저장
    await db.collection("Veritas-protocol").add({
      title: title,
      content: content,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    alert("등록 완료!");
    document.getElementById('reg-title').value = '';
    document.getElementById('reg-content').value = '';
  }

  async function loadData() {
    const list = document.getElementById('content-list');
    list.innerHTML = "불러오는 중...";
    const snapshot = await db.collection("Veritas-protocol").get();
    
    list.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">
                          <h3>${data.title}</h3>
                          <p>${data.content}</p>
                         </div>`;
    });
  }

  // 초기 로드
  loadData();
</script>
</body>
</html>
